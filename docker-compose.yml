services:
  web:
    depends_on: [api]
    image: egortensin/wg-api-web:1
    ports:
      - '8090:80'
    restart: unless-stopped
    volumes:
      - './data:/data:ro'
  api:
    cap_add:
      - NET_ADMIN
    command: wg-api --device "${WG_IFACE:-wg0}" --listen 192.168.177.1:1234
    # The upstream image doesn't use tags (as of April '26), just hashes, so
    # we're pinning to latest.
    image: james/wg-api
    network_mode: host
    restart: unless-stopped

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        # The network is hardcoded; please don't change. If you run into
        # problems, let me know.
        - subnet: 192.168.177.0/24
